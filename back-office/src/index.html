<!DOCTYPE html>
<html lang="en">
  <head>
    <title>Agrohelp Consulting</title>
    <meta charset="UTF-8" />
    <base href="/">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <link rel="icon" type="image/x-icon" href="favicon.ico?v=2">
  </head>
  <body>
    <app-root>
      <div style="display: flex; justify-content: center; align-items: center; height: 100vh; background-color: #f5f5f5;">
        <div style="text-align: center;">
          <div style="border: 4px solid #e0e0e0; border-top: 4px solid #2196f3; border-radius: 50%; width: 50px; height: 50px; animation: spin 1s linear infinite; margin: 0 auto;"></div>
          <p style="margin-top: 16px; font-family: 'Roboto', sans-serif; color: #616161;">Loading Agrohelp Consulting...</p>
        </div>
      </div>
      <style>
        @keyframes spin {
          0% { transform: rotate(0deg); }
          100% { transform: rotate(360deg); }
        }
      </style>
    </app-root>
  </body>
</html>
